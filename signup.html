<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The_ProBeter's Games - Request Access</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #e0f2fe;
            color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .form-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; margin-bottom: 0.5rem; text-align: center; color: #2563eb; }
        p { text-align: center; color: #475569; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.4; }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 1.1rem;
        }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #475569; }
        .form-group input {
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
        }
        .submit-btn {
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover { background: #1d4ed8; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #475569;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Request Admin Access</h2>
        <p>Submit your requested login details. An application card will be emailed to the system owner for confirmation verification.</p>
        
        <form action="https://formsubmit.co/theprobetergames@gmail.com" method="POST">
            
            <input type="hidden" name="_subject" value="New Game Portal Account Registration Request!">
            <input type="hidden" name="_honeypot" style="display:none">
            
            <div class="form-group">
                <label for="username">Requested Username</label>
                <input type="text" id="username" name="Requested Username" required placeholder="e.g., CoolCoder22">
            </div>
            
            <div class="form-group">
                <label for="password">Requested Password</label>
                <input type="text" id="password" name="Requested Password" required placeholder="Pick a secure password">
            </div>
            
            <div class="form-group">
                <label for="discord">Discord Handle</label>
                <input type="text" id="discord" name="Discord Username" required placeholder="username or username#0000">
            </div>
            
            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
        
        <a href="index.html" class="back-link">← Cancel and return home</a>
    </div>

</body>
</html>
