<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The_ProBeter's Games</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root {
            --bg-color: #e0f2fe; 
            --card-bg: #ffffff; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --accent: #2563eb; 
            --accent-hover: #1d4ed8; 
            --secondary-btn: #475569; 
            --secondary-btn-hover: #334155;
            --disabled-btn: #cbd5e1; 
            --disabled-text: #94a3b8;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- HEADER LAYOUT POSITIONING --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h1 { font-size: 2.5rem; margin: 0 0 0.5rem 0; }
        p { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

        /* --- GRID & CARD LAYOUTS --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        @media (max-width: 768px) {
            .game-grid { grid-template-columns: 1fr; } 
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }

        .thumbnail-container { width: 100%; height: 200px; position: relative; overflow: hidden; }
        .game-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .fallback-thumb {
            width: 100%; height: 100%; background-color: #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            color: #475569; font-weight: bold; text-align: center;
            padding: 0 1rem; box-sizing: border-box;
        }

        .content { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .tags { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .tag { background: #e2e8f0; font-size: 0.8rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
        h2 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
        .description { font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; color: var(--text-muted); flex-grow: 1; }
        .btn-group { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: auto; }

        .btn {
            flex: 1; min-width: 110px; display: inline-block; color: white;
            padding: 0.6rem 1.2rem; text-decoration: none; border-radius: 6px;
            font-weight: 500; text-align: center; transition: background-color 0.2s;
        }
        .btn-play { background-color: var(--accent); }
        .btn-play:hover { background-color: var(--accent-hover); }
        .btn-source { background-color: var(--secondary-btn); }
        .btn-source:hover { background-color: var(--secondary-btn-hover); }
        .btn-disabled { background-color: var(--disabled-btn); color: var(--disabled-text); cursor: not-allowed; pointer-events: none; }
        .btn-small-text { font-size: 0.75rem; padding: 0.5rem 0.8rem; display: flex; align-items: center; justify-content: center; }

        footer { margin-top: auto; text-align: center; padding-top: 4rem; padding-bottom: 1rem; }
        .social-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; }
        .social-icon { width: 45px; height: 45px; transition: transform 0.2s; }
        .social-icon:hover { transform: scale(1.1); }
        .coming-soon { font-size: 1.2rem; font-weight: bold; color: #1e3a8a; margin: 0; }
    </style>
</head>
<body>

    <header>
        <img src="icon.png" alt="The_ProBeter Icon" class="header-icon" onerror="this.style.display='none';">
        <div>
            <h1>The_ProBeter's GAME'S!</h1>
            <p>Heres the games i made!</p>
        </div>
    </header>

    <main class="game-grid" id="gameGridContainer">
        </main>

    <footer>
        <div class="social-links">
            <a href="https://www.youtube.com/@The_ProBeterGaming" target="_blank">
                <img src="yt-icon.png" alt="YouTube" class="social-icon" onerror="this.src='https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/youtube.svg'">
            </a>
            <a href="https://discord.gg/sWreCUdCbT" target="_blank">
                <img src="discord-icon.png" alt="Discord" class="social-icon" onerror="this.src='https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/discord.svg'">
            </a>
        </div>
        <p class="coming-soon">👍MORE GAMES COMING SOON 👍</p>
    </footer>

    <script>
        // ==========================================================
        // YOUR GAMES LIST
        // To add, edit, or delete a game card, just update this list!
        // ==========================================================
        const myGames = [
            {
                title: "A Unity Project to test my skills",
                imgSrc: "aupttmsimage.png",
                tags: ["Unity 6", "Itch.io", "Old Source Code"],
                desc: "A game i made to test my unity skills. Ill say i did pretty good!",
                type: "playable", // Options: "playable", "playonly", "game2", "comingsoon"
                playUrl: "https://the-probeter.itch.io/a-unity-project-to-test-my-skills",
                sourceUrl: "https://github.com/TheProBeter/Project-I-made-to-test-my-unity-skills-Source-Code/releases/tag/sourcecode"
            },
            {
                title: "A Unity 5 Project",
                imgSrc: "unity-5-project.png",
                tags: ["Unity 5.0", "Itch.io"],
                desc: "A unity 5.0 project! Please don't use unity 5 as your default editor though, source code is also available.",
                type: "game2",
                playUrl: "https://the-probeter.itch.io/a-unity-5-project",
                sourceUrl: ""
            },
            {
                title: "A Unity Project to test my skills 2",
                imgSrc: "aupttms2-image.png",
                tags: ["Unity", "In Development"],
                desc: "Another game i made to improve on my skills!",
                type: "comingsoon",
                playUrl: "",
                sourceUrl: ""
            },
            {
                title: "???",
                imgSrc: "secret-project.png",
                tags: ["???", "Top Secret"],
                desc: "???",
                type: "comingsoon",
                playUrl: "",
                sourceUrl: ""
            }
        ];

        // This function automatically builds the HTML cards based on your list above
        function renderGames() {
            const container = document.getElementById('gameGridContainer');
            container.innerHTML = '';

            myGames.forEach(game => {
                const article = document.createElement('article');
                article.className = 'card';

                let tagsHTML = '';
                game.tags.forEach(tag => {
                    tagsHTML += `<span class="tag">${tag}</span>`;
                });

                let buttonsHTML = '';
                if (game.type === 'playable') {
                    buttonsHTML = `
                        <a href="${game.playUrl}" target="_blank" class="btn btn-play">Play Game</a>
                        <a href="${game.sourceUrl}" target="_blank" class="btn btn-source">Old source code</a>
                    `;
                } else if (game.type === 'playonly') {
                    buttonsHTML = `
                        <a href="${game.playUrl}" target="_blank" class="btn btn-play">Play Game</a>
                    `;
                } else if (game.type === 'game2') {
                    buttonsHTML = `
                        <a href="${game.playUrl}" target="_blank" class="btn btn-play">Play Game</a>
                        <span class="btn btn-disabled btn-small-text">Game code available on same page as game</span>
                    `;
                } else {
                    buttonsHTML = `<a href="#" class="btn btn-disabled">Coming Soon</a>`;
                }

                article.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${game.imgSrc}" alt="${game.title}" class="game-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="fallback-thumb" style="display:none;">${game.title}</div>
                    </div>
                    <div class="content">
                        <div class="tags">${tagsHTML}</div>
                        <h2>${game.title}</h2>
                        <p class="description">${game.desc}</p>
                        <div class="btn-group">
                            ${buttonsHTML}
                        </div>
                    </div>
                `;
                container.appendChild(article);
            });
        }

        // Run the render function when the page loads
        window.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>
</html>
